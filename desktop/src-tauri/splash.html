<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghostpaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    text-align: center;
    animation: fadeIn 0.6s ease-out;
  }
  .glyph {
    font-size: 64px;
    margin-bottom: 24px;
    animation: pulse 2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(88, 166, 255, 0.4));
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    color: #58a6ff;
    letter-spacing: 2px;
    margin-bottom: 16px;
    text-shadow: 0 0 30px rgba(88, 166, 255, 0.3);
  }
  .status {
    font-size: 14px;
    color: #8b949e;
    letter-spacing: 1px;
  }
  .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="glyph">&#x1F43E;</div>
    <h1>GHOSTPAW</h1>
    <p class="status">Starting<span class="dots"></span></p>
  </div>
</body>
</html>
