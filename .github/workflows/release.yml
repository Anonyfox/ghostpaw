name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Lint & format
        run: npx biome check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify artifact version matches tag
        run: |
          ARTIFACT_VERSION=$(node dist/ghostpaw.mjs --version)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$ARTIFACT_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: artifact=$ARTIFACT_VERSION tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $ARTIFACT_VERSION"

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ghostpaw.mjs
          generate_release_notes: true

      - name: Upload artifact for Docker job
        uses: actions/upload-artifact@v4
        with:
          name: ghostpaw-mjs
          path: dist/ghostpaw.mjs

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: ghostpaw-mjs
          path: dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/anonyfox/ghostpaw:latest
            ghcr.io/anonyfox/ghostpaw:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
