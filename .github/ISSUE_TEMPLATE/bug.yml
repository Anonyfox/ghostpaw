name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `ghostpaw init`
        2. ...
    validations:
      required: true

  - type: input
    id: ghostpaw-version
    attributes:
      label: Ghostpaw version
      description: "Output of `ghostpaw --version`"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: "Output of `node --version`"
      placeholder: "v22.5.0"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - npx
        - npm global
        - curl / install.sh
        - Docker
        - Built from source
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11 WSL"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output. This will be formatted as code automatically.
      render: shell
